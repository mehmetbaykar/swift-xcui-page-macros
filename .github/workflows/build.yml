name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Toolchain info
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build (strict concurrency, warnings as errors)
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test
