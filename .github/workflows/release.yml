name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-demo:
    name: Attach demo to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload demo to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" SampleApp/auth-flow-demo.mp4 --clobber
